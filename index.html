<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime AMOLED Downloader</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="amoled-theme">
    <div class="container">
        <header>
            <h1>Anime <span class="accent">OLED</span></h1>
            <p>Anime That Glows in the Dark</p>
        </header>

        <main>
            <div class="controls glass">
                <div class="control-group">
                    <label for="type-toggle">Content Type</label>
                    <div class="toggle-container">
                        <span class="toggle-label sfw active">SFW</span>
                        <label class="switch">
                            <input type="checkbox" id="type-toggle">
                            <span class="slider round"></span>
                        </label>
                        <span class="toggle-label nsfw">NSFW</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Category</label>
                    <div class="custom-dropdown" id="category-dropdown">
                        <button class="dropdown-trigger glass" id="dropdown-trigger" aria-haspopup="true"
                            aria-expanded="false">
                            <span id="selected-category">Waifu</span>
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" aria-hidden="true">
                                <path d="m6 9 6 6 6-6" />
                            </svg>
                        </button>
                        <div class="dropdown-popover glass hidden" id="dropdown-popover">
                            <div class="popover-header">
                                <span>Choose a category</span>
                            </div>
                            <div class="category-grid" id="category-grid">
                                <!-- Categories will be populated by JS -->
                            </div>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button id="find-btn" class="primary-btn">Find</button>
                    <button id="download-btn" class="secondary-btn" disabled>Download</button>
                </div>
            </div>

            <div class="image-display glass">
                <div id="loader" class="loader hidden"></div>
                <img id="anime-img" src="" alt="Anime Image Preview" class="hidden">
                <div id="placeholder" class="placeholder">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                        <circle cx="9" cy="9" r="2" />
                        <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                    </svg>
                    <p>Search for an image to preview</p>
                </div>
            </div>
        </main>

        <footer>
            <p>Powered by <a href="https://waifu.pics" target="_blank" rel="noopener noreferrer">waifu.pics</a> API</p>
        </footer>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
