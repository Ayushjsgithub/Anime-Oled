<!DOCTYPE html>
<html lang="en">

<!-- ============================================================
     Anime OLED — index.html
     AMOLED-optimized anime image finder and downloader.
     Powered by the waifu.pics public API.
     Fonts: Outfit (Google Fonts) | Styles: styles/style.css
     Logic:  js/script.js
     ============================================================ -->

<!-- ─── HEAD: Meta, Styles & Fonts ─────────────────────────── -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime OLED — Anime That Glows in the Dark</title>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles/style.css">

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<!-- ─── BODY ─────────────────────────────────────────────────
     .amoled-theme applies the pure black (#000) background.
     ─────────────────────────────────────────────────────────── -->

<body class="amoled-theme">


    <div class="container">

        <!-- ─── EXTERNAL BANNER ─────────────────────────────── -->
        <div id="banner-target"></div>
        <script
            src="https://keepandroidopen.org/banner.js?size=mini&animation=off&id=banner-target&hidebutton=off"></script>


        <!-- ─── HEADER: Title & Tagline ─────────────────────── -->
        <header>
            <h1>Anime <span class="accent">OLED</span></h1>
            <p>Anime That Glows in the Dark</p>
        </header>

        <main>

            <!-- ─── CONTROLS CARD ─────────────────────────────
                 Glass card holding content type toggle,
                 category dropdown, and action buttons.
                 z-index keeps dropdown popover above image card.
                 ─────────────────────────────────────────────── -->
            <div class="controls glass">

                <!-- SFW / NSFW Toggle -->
                <div class="control-group">
                    <label for="type-toggle">Content Type</label>
                    <div class="toggle-container">
                        <span class="toggle-label sfw active">SFW</span>
                        <label class="switch">
                            <input type="checkbox" id="type-toggle">
                            <span class="slider round"></span>
                        </label>
                        <span class="toggle-label nsfw">NSFW</span>
                    </div>
                </div>

                <!-- Category Dropdown
                     Trigger button opens a glass popover grid.
                     Grid items are dynamically injected by script.js.
                     aria-expanded is updated by JS for accessibility. -->
                <div class="control-group">
                    <label>Category</label>
                    <div class="custom-dropdown" id="category-dropdown">
                        <button class="dropdown-trigger glass" id="dropdown-trigger" aria-haspopup="true"
                            aria-expanded="false">
                            <span id="selected-category">Waifu</span>
                            <!-- Chevron icon -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" aria-hidden="true">
                                <path d="m6 9 6 6 6-6" />
                            </svg>
                        </button>
                        <!-- Popover grid — populated dynamically by JS -->
                        <div class="dropdown-popover glass hidden" id="dropdown-popover">
                            <div class="popover-header">
                                <span>Choose a category</span>
                            </div>
                            <div class="category-grid" id="category-grid">
                                <!-- Injected by populateCategories() in script.js -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons
                     Download is disabled until an image has been fetched. -->
                <div class="button-group">
                    <button id="find-btn" class="primary-btn">Find</button>
                    <button id="download-btn" class="secondary-btn" disabled>Download</button>
                </div>

            </div><!-- /.controls -->

            <!-- ─── IMAGE DISPLAY CARD ─────────────────────────
                 Floating panel that previews the fetched image.
                 Three possible states (managed by JS):
                   • #placeholder — initial empty state (SVG icon)
                   • #loader      — spinner while image is loading
                   • #anime-img   — loaded image
                 ─────────────────────────────────────────────── -->
            <div class="image-display glass">

                <!-- Loading spinner (hidden by default) -->
                <div id="loader" class="loader hidden"></div>

                <!-- Carousel Viewport: Contains the sliding image track and navigation arrows -->
                <div id="carousel-viewport" class="carousel-viewport hidden">
                    <div id="carousel-track" class="carousel-track">
                        <!-- Image slides will be injected here by script.js -->
                    </div>

                    <!-- Navigation Arrows -->
                    <button class="nav-arrow prev-arrow glass" id="prev-btn" aria-label="Previous image">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m15 18-6-6 6-6" />
                        </svg>
                    </button>
                    <button class="nav-arrow next-arrow glass" id="next-btn" aria-label="Next image">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m9 18 6-6-6-6" />
                        </svg>
                    </button>
                </div>

                <!-- Placeholder shown before any image is fetched -->
                <div id="placeholder" class="placeholder">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                        <circle cx="9" cy="9" r="2" />
                        <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                    </svg>
                    <p>Search for an image collection to preview</p>
                </div>

            </div><!-- /.image-display -->

            <!-- ─── THUMBNAIL TRACK ───
                 Dynamic row that populates with many images at once.
                 The active thumbnail expands in width to highlight it.
                 ─────────────────────────────────────────────── -->
            <div id="thumbnail-area" class="thumbnail-area hidden">
                <div id="thumbnail-track" class="thumbnail-track scrollbar-hide">
                    <!-- Thumbnails will be injected here by script.js -->
                </div>
            </div>

        </main>

        <!-- ─── FOOTER: API Attribution ──────────────────────── -->
        <footer>
            <p>Powered by <a href="https://waifu.pics" target="_blank" rel="noopener noreferrer">waifu.pics</a> API</p>
        </footer>

    </div><!-- /.container -->

    <!-- ─── SCRIPTS ──────────────────────────────────────────── -->
    <script src="js/script.js"></script>

</body>

</html>
